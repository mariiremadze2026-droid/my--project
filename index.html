<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anime Battle Royale</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
canvas{display:block;}

.btn{position:fixed;width:70px;height:70px;
background:rgba(255,255,255,0.2);
display:flex;justify-content:center;
align-items:center;border-radius:10px;color:#fff;}

#fire{right:20px;bottom:100px;}
#dash{right:100px;bottom:100px;}
#ult{right:60px;bottom:180px;background:red;}
#attack{right:20px;bottom:180px;}

#joyBase{position:fixed;left:20px;bottom:20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.1);}
#joyStick{position:fixed;left:70px;bottom:70px;width:40px;height:40px;border-radius:50%;background:cyan;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="btn" id="fire">🔥</div>
<div class="btn" id="dash">⚡</div>
<div class="btn" id="ult">💥</div>
<div class="btn" id="attack">⚔</div>

<div id="joyBase"></div>
<div id="joyStick"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let players={},items=[],boss={},zone={},projectiles=[];
let joy={x:0,y:0};

// joystick
let base=document.getElementById("joyBase");
let stick=document.getElementById("joyStick");
let drag=false;

base.addEventListener("touchstart",()=>drag=true);
base.addEventListener("touchend",()=>{drag=false;joy={x:0,y:0};stick.style.transform="translate(0,0)";});

base.addEventListener("touchmove",(e)=>{
 if(!drag) return;
 let t=e.touches[0];
 let r=base.getBoundingClientRect();
 let dx=t.clientX-(r.left+60);
 let dy=t.clientY-(r.top+60);
 let d=Math.sqrt(dx*dx+dy*dy);
 let max=50;
 if(d>max){dx=dx/d*max;dy=dy/d*max;}
 stick.style.transform=`translate(${dx}px,${dy}px)`;
 joy={x:dx/max,y:dy/max};
});

// sockets
socket.on("players",d=>players=d);
socket.on("items",d=>items=d);
socket.on("boss",d=>boss=d);
socket.on("zone",d=>zone=d);
socket.on("projectiles",d=>projectiles=d);

// move
function update(){
 socket.emit("move",{x:joy.x*5,y:joy.y*5});
}

// draw
function draw(){
 ctx.fillStyle="#050510";
 ctx.fillRect(0,0,c.width,c.height);

 // zone
 if(zone.x){
 ctx.strokeStyle="white";
 ctx.beginPath();
 ctx.arc(zone.x,zone.y,zone.r,0,Math.PI*2);
 ctx.stroke();
 }

 // items
 items.forEach(i=>{
  ctx.fillStyle="yellow";
  ctx.fillRect(i.x,i.y,10,10);
 });

 // boss
 if(boss.x){
  ctx.fillStyle=boss.phase===1?"purple":"red";
  ctx.beginPath();
  ctx.arc(boss.x,boss.y,40,0,Math.PI*2);
  ctx.fill();
 }

 // projectiles
 ctx.fillStyle="orange";
 projectiles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,6,0,Math.PI*2);
  ctx.fill();
 });

 // players
 for(let id in players){
  let p=players[id];
  ctx.fillStyle=p.team==="red"?"red":"cyan";
  ctx.fillRect(p.x,p.y,15,15);
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

// buttons
document.getElementById("fire").onclick=()=>{
 socket.emit("skill",{type:"fireball",dirX:1,dirY:0});
};

document.getElementById("dash").onclick=()=>{
 socket.emit("skill",{type:"teleport",dirX:1,dirY:0});
};

document.getElementById("ult").onclick=()=>{
 socket.emit("skill",{type:"ultimate"});
};

document.getElementById("attack").onclick=()=>{
 socket.emit("attack",{damage:10});
};

</script>
</body>
</html>
